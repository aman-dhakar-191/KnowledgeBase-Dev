name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            functions/package-lock.json

      # Determine deploy target from branch
      - name: Set deploy target
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "app_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "env=sandbox" >> "$GITHUB_OUTPUT"
            echo "app_env=sandbox" >> "$GITHUB_OUTPUT"
          fi

      # ---------- Frontend ----------
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_FUNCTIONS_URL: ${{ secrets.VITE_FUNCTIONS_URL }}
          VITE_APP_ENV: ${{ steps.target.outputs.app_env }}

      # ---------- Cloud Functions ----------
      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Lint functions
        run: npm run lint
        working-directory: functions

      - name: Write functions environment file
        run: |
          cat > functions/.env <<'EOF'
          GITHUB_TOKEN=${{ secrets.TOKEN_VALUE }}
          GITHUB_OWNER=${{ secrets.OWNER }}
          GITHUB_REPO=${{ secrets.REPO }}
          GITHUB_BRANCH=${{ secrets.BRANCH }}
          EOF

      # ---------- Deploy ----------
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase (${{ steps.target.outputs.env }})
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          firebase deploy --only hosting:${{ steps.target.outputs.env }},functions,firestore:indexes --non-interactive --project knowladgebase-226cc --force
